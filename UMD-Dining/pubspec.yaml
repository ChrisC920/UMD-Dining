name: umd_dining_refactor
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.5.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Convex (replaces supabase_flutter)
  convex_flutter: ^3.0.1

  # Auth (replaces supabase auth, google_sign_in, sign_in_with_apple)
  clerk_flutter: ^0.0.14-beta
  clerk_auth: ^0.0.14-beta

  # State management
  flutter_bloc: ^8.1.6
  get_it: ^8.0.0
  equatable: ^2.0.7

  # Functional
  fpdart: ^1.1.0

  # UI
  google_nav_bar: ^5.0.6
  google_fonts: ^8.0.0
  animations: ^2.0.11
  flutter_moving_background: ^0.0.5
  gif: ^2.3.0
  numberpicker: ^2.1.2
  url_launcher: ^6.3.1
  string_similarity: ^2.1.1
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.4
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
     - assets/images/
